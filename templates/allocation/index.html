{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h3>Asset Allocation</h3>
  <a href="{{ url_for('allocation.allocate') }}" class="btn btn-primary">+ Allocate Asset</a>
</div>

<table class="table">
  <thead><tr><th>Asset</th><th>Held by</th><th>Expected Return</th><th>Actions</th></tr></thead>
  <tbody>
    {% for a in allocations %}
    <tr>
      <td>{{ a.asset_tag }} - {{ a.asset_name }}</td>
      <td>{{ a.employee_name }}</td>
      <td>{{ a.expected_return or "-" }}</td>
      <td class="d-flex gap-2">
        <form method="POST" action="{{ url_for('allocation.return_asset', allocation_id=a.id) }}">
          <input type="hidden" name="condition_notes" value="OK on return">
          <button class="btn btn-sm btn-outline-success">Return</button>
        </form>
        <form method="POST" action="{{ url_for('allocation.transfer', allocation_id=a.id) }}" class="d-flex gap-1">
          <input type="number" name="new_employee_id" class="form-control form-control-sm" placeholder="New employee ID" style="width:140px">
          <button class="btn btn-sm btn-outline-warning">Transfer</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
