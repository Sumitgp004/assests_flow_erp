<!DOCTYPE html>
<html>
<head>
<title>AssetFlow ERP Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f1f5f9;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:850px;
    display:flex;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0px 10px 30px rgba(0,0,0,0.2);
}

.left{
    width:45%;
    background:#1e40af;
    color:white;
    padding:50px 30px;
    text-align:center;
}

.left i{
    font-size:70px;
    margin-bottom:20px;
}

.left h1{
    margin-bottom:20px;
}

.left p{
    line-height:28px;
}

.right{
    width:55%;
    padding:50px;
}

.right h2{
    text-align:center;
    color:#1e293b;git 
    margin-bottom:30px;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

.input-group input{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
}

.input-group input:focus{
    outline:none;
    border-color:#2563eb;
}

button{
    width:100%;
    padding:14px;
    background:#1e40af;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:gray;
    font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<div class="left">

<i class="fa-solid fa-building"></i>

<h1>AssetFlow ERP</h1>

<p>
Enterprise Asset and Resource Management System
for College Department.
Manage assets, employees and maintenance records
efficiently.
</p>

</div>

<div class="right">

<h2>Login</h2>

<form>

<div class="input-group">
<label>Email</label>
<input type="email" placeholder="Enter Email">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" placeholder="Enter Password">
</div>

<button type="submit">
<i class="fa-solid fa-right-to-bracket"></i>
 Login
</button>

<div class="footer">
© 2026 Department of Computer Engineering
</div>

</form>

</div>

</div>

</body>
</html>
