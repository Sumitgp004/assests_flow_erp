<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AssetFlow - Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.login-box{

    width:420px;
    background:#fff;
    border-radius:20px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);

}

.logo{

    text-align:center;
    margin-bottom:30px;

}

.logo i{

    font-size:55px;
    color:#2563eb;
    margin-bottom:10px;

}

.logo h1{

    font-size:30px;
    color:#1e293b;

}

.logo p{

    color:#64748b;
    margin-top:8px;
    font-size:14px;

}

.input-group{

    margin-bottom:20px;

}

.input-group label{

    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#334155;

}

.input-box{

    position:relative;

}

.input-box i{

    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:#64748b;

}

.input-box input{

    width:100%;
    padding:14px 45px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    font-size:15px;
    outline:none;
    transition:.3s;

}

.input-box input:focus{

    border-color:#2563eb;
    box-shadow:0 0 5px rgba(37,99,235,.3);

}

#togglePassword{

    left:auto;
    right:15px;
    cursor:pointer;

}

.options{

    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    font-size:14px;

}

.options a{

    text-decoration:none;
    color:#2563eb;
    font-weight:500;

}

.options a:hover{

    text-decoration:underline;

}

.remember{

    display:flex;
    align-items:center;
    gap:6px;

}

.login-btn{

    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;

}

.login-btn:hover{

    background:#1d4ed8;

}

.footer{

    margin-top:25px;
    text-align:center;
    color:#64748b;
    font-size:13px;

}

</style>

</head>

<body>

<div class="container">

<div class="login-box">

<div class="logo">

<i class="fa-solid fa-boxes-stacked"></i>

<h1>AssetFlow</h1>

<p>Enterprise Asset & Resource Management System</p>

</div>

<form id="loginForm">

<div class="input-group">

<label>Email Address</label>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Enter your email"
required>

</div>

</div>

<div class="input-group">

<label>Password</label>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
placeholder="Enter your password"
required>

<i class="fa-solid fa-eye" id="togglePassword"></i>

</div>

</div>

<div class="options">

<label class="remember">

<input type="checkbox">

Remember Me

</label>

<a href="#">Forgot Password?</a>

</div>

<button class="login-btn" type="submit">

Login

</button>

<div class="footer">

© 2026 AssetFlow ERP | College Department Asset Management

</div>

</form>

</div>

</div>
<script>

const togglePassword = document.getElementById("togglePassword");
const password = document.getElementById("password");
const form = document.getElementById("loginForm");
const button = document.querySelector(".login-btn");

togglePassword.addEventListener("click", function(){

    if(password.type === "password"){

        password.type = "text";
        this.classList.remove("fa-eye");
        this.classList.add("fa-eye-slash");

    }else{

        password.type = "password";
        this.classList.remove("fa-eye-slash");
        this.classList.add("fa-eye");

    }

});

form.addEventListener("submit", function(e){

    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const pass = password.value.trim();

    if(email === "" || pass === ""){

        alert("Please fill all fields.");
        return;

    }

    const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    if(!email.match(emailPattern)){

        alert("Please enter a valid email address.");
        return;

    }

    button.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Logging in...';
    button.disabled = true;

    // ---------- Demo Login ----------
    // Replace this block with your Flask backend later.

    setTimeout(function(){

        if(email === "admin@assetflow.com" && pass === "admin123"){

            alert("Login Successful!");

            window.location.href = "dashboard.html";

        }else{

            alert("Invalid Email or Password");

            button.innerHTML = "Login";
            button.disabled = false;

        }

    },1500);

});

</script>

</body>
</html>
